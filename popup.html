<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Forms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      width: 340px;
    }
    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      box-sizing: border-box;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      margin: 0 0 12px;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      padding: 8px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #cbd5f5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      background: #ffffff;
    }
    button {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 9999px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }
    button:hover {
      background: #1d4ed8;
    }
    button:disabled {
      background: #9ca3af;
      cursor: default;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #475569;
      text-align: center;
      min-height: 18px;
    }
    .link {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
    }
    .link a {
      color: #2563eb;
      text-decoration: none;
    }
    .link a:hover {
      text-decoration: underline;
    }
    .hint {
      font-size: 11px;
      color: #6b7280;
      margin-top: 6px;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de Forms</h1>

    <label for="jsonInput" class="hint">
      Modo teste: cada pergunta precisa de <code>correctAnswer</code> (e <code>points</code> opcional).
      <br />
      <code>
        {"title":"Quiz","questions":[{"type":"text","text":"2+2?","correctAnswer":"4"},{"type":"radio","text":"Cor do céu?","options":["Verde","Azul"],"correctAnswer":"Azul","points":2}]}
      </code>
    </label>

    <textarea id="jsonInput" placeholder='{"title":"Título","questions":[{"type":"text","text":"Pergunta","correctAnswer":"ok"}]}'></textarea>

    <button id="createBtn">Criar formulário no Google</button>

    <div id="status" class="status">Aguardando JSON...</div>
    <div id="formLink" class="link"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
